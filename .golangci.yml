run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - prealloc
    - noctx
    - gosec
    - rowserrcheck
    - sqlclosecheck
    - gocognit
    - cyclop

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: my-app
  gocognit:
    min-complexity: 15
  cyclop:
    max-complexity: 10
    skip-tests: true
  gosec:
    severity: medium
    confidence: medium
  revive:
    rules:
      - name: exported
        disabled: false
      - name: unexported-return
        disabled: false
      - name: var-naming
        disabled: false

issues:
  exclude-rules:
    # Relax security and complexity checks in test files.
    - path: "_test\\.go"
      linters:
        - gosec
        - gocognit
        - cyclop
    # sqlc generated code is not edited manually — skip all linters there.
    - path: "internal/db/generated/"
      linters:
        - errcheck
        - gosimple
        - govet
        - staticcheck
        - unused
        - gofmt
        - goimports
        - revive
        - gosec
        - gocognit
        - cyclop
    # docs/ is auto-generated by swag — skip all linters.
    - path: "docs/"
      linters:
        - errcheck
        - gosimple
        - govet
        - staticcheck
        - unused
        - gofmt
        - goimports
        - revive
        - gosec
        - gocognit
        - cyclop

  max-issues-per-linter: 0
  max-same-issues: 0
